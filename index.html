<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dostwin Official – Loading</title>
  <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/G2SQpxSy/IMG-20260413-215219-869.jpg"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f0c040;
      --gold2: #e8a000;
      --dark: #0a0608;
      --card-bg: rgba(10,6,8,0.72);
      --border-gold: rgba(240,192,64,0.35);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
      background: #0a0608;
      color: #fff;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('https://i.postimg.cc/s2Yq1qpQ/Screenshot-20260413-220330-Files-by-Google.png');
      background-size: cover;
      background-position: center;
      filter: blur(18px) brightness(0.38) saturate(1.3);
      transform: scale(1.07);
      animation: bgBreath 8s ease-in-out infinite alternate;
    }
    @keyframes bgBreath {
      from { filter: blur(18px) brightness(0.38) saturate(1.3); }
      to   { filter: blur(14px) brightness(0.44) saturate(1.5); }
    }

    /* faint vignette */
    .vignette {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
    }

    /* ── TOP NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px;
      background: rgba(10,6,8,0.55);
      backdrop-filter: blur(20px) saturate(1.6);
      border-bottom: 1px solid var(--border-gold);
      animation: slideDown .7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-30px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .nav-logo img {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      object-fit: cover;
      box-shadow: 0 0 14px rgba(240,192,64,0.45);
    }
    .nav-logo-text {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #f0c040 30%, #fff6c0 60%, #e8a000 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }

    .nav-btns { display: flex; gap: 12px; }

    .btn {
      padding: 9px 22px;
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all .25s ease;
      text-decoration: none;
    }
    .btn-login {
      background: transparent;
      border: 1.5px solid var(--gold);
      color: var(--gold);
    }
    .btn-login:hover {
      background: rgba(240,192,64,0.12);
      box-shadow: 0 0 16px rgba(240,192,64,0.3);
    }
    .btn-register {
      background: linear-gradient(135deg, #f0c040, #e8a000);
      color: #1a0e00;
    }
    .btn-register:hover {
      box-shadow: 0 0 22px rgba(240,160,0,0.55);
      transform: translateY(-1px);
    }

    /* ── CENTER CONTENT ── */
    .center {
      position: relative; z-index: 10;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      padding-top: 70px;
    }

    /* Logo glow ring */
    .logo-wrap {
      position: relative;
      animation: fadeUp .9s .2s cubic-bezier(.22,1,.36,1) both;
      margin-bottom: 28px;
    }
    .logo-wrap::before {
      content: '';
      position: absolute; inset: -10px;
      border-radius: 50%;
      background: conic-gradient(var(--gold), var(--gold2), #fff6c0, var(--gold));
      animation: spinRing 4s linear infinite;
      filter: blur(4px);
      opacity: 0.65;
    }
    .logo-wrap::after {
      content: '';
      position: absolute; inset: -2px;
      border-radius: 50%;
      background: var(--dark);
    }
    @keyframes spinRing {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .logo-img {
      position: relative; z-index: 2;
      width: 130px; height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--gold);
      box-shadow: 0 0 40px rgba(240,192,64,0.5), 0 0 80px rgba(240,160,0,0.25);
    }

    /* Site name */
    .site-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 900;
      letter-spacing: 4px;
      text-align: center;
      background: linear-gradient(135deg, #f0c040 0%, #fff6c0 45%, #e8a000 75%, #f0c040 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeUp .9s .35s cubic-bezier(.22,1,.36,1) both, shine 3s linear infinite;
      text-shadow: none;
      margin-bottom: 6px;
    }
    @keyframes shine {
      from { background-position: 0% center; }
      to   { background-position: 200% center; }
    }

    .tagline {
      font-size: 0.72rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(240,192,64,0.6);
      text-align: center;
      animation: fadeUp .9s .5s both;
      margin-bottom: 48px;
    }

    /* divider */
    .divider {
      width: 180px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 48px;
      animation: fadeUp .9s .55s both;
    }

    /* Loading bar */
    .loader-box {
      width: clamp(220px, 55vw, 400px);
      animation: fadeUp .9s .65s both;
    }
    .loader-label {
      display: flex; justify-content: space-between;
      font-size: 0.68rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
    }
    .loader-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }
    .loader-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #e8a000, #f0c040, #fff6c0);
      width: 0%;
      animation: loadFill 3.2s cubic-bezier(.4,0,.2,1) .9s forwards;
      position: relative;
    }
    .loader-fill::after {
      content: '';
      position: absolute; right: 0; top: 50%;
      transform: translateY(-50%);
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #fff6c0;
      box-shadow: 0 0 12px 4px rgba(255,246,192,0.7);
    }
    @keyframes loadFill {
      0%   { width: 0%; }
      40%  { width: 48%; }
      70%  { width: 74%; }
      90%  { width: 91%; }
      100% { width: 100%; }
    }

    .loader-pct {
      text-align: right;
      font-size: 0.68rem;
      letter-spacing: 2px;
      color: rgba(240,192,64,0.7);
      margin-top: 8px;
      font-variant-numeric: tabular-nums;
    }

    /* floating coins */
    .coin {
      position: fixed;
      font-size: 1.4rem;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      animation: floatCoin var(--dur, 7s) var(--delay, 0s) ease-in-out infinite;
    }
    @keyframes floatCoin {
      0%   { opacity:0; transform: translateY(110vh) rotate(0deg) scale(.8); }
      10%  { opacity:.55; }
      90%  { opacity:.35; }
      100% { opacity:0;  transform: translateY(-10vh) rotate(360deg) scale(1.1); }
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(22px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      nav { padding: 11px 16px; }
      .nav-logo-text { font-size: 0.72rem; }
      .btn { padding: 8px 14px; font-size: 0.7rem; letter-spacing: 1px; }
      .logo-img { width: 100px; height: 100px; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg"></div>
  <div class="vignette"></div>

  <!-- Floating coins -->
  <script>
    const symbols = ['🪙','💎','🃏','🎰','♠','♥','♦','♣'];
    for(let i=0;i<18;i++){
      const el = document.createElement('div');
      el.className='coin';
      el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
      el.style.left = Math.random()*100+'vw';
      el.style.setProperty('--dur',(6+Math.random()*8)+'s');
      el.style.setProperty('--delay',(Math.random()*6)+'s');
      el.style.fontSize=(0.9+Math.random()*1.2)+'rem';
      document.body.appendChild(el);
    }
  </script>

  <!-- Top Nav -->
  <nav>
    <a class="nav-logo" href="#">
      <img src="https://i.postimg.cc/G2SQpxSy/IMG-20260413-215219-869.jpg" alt="Dostwin Logo"/>
      <span class="nav-logo-text">Dostwin Official</span>
    </a>
    <div class="nav-btns">
      <a href="#" class="btn btn-login">Login</a>
      <a href="#" class="btn btn-register">Register</a>
    </div>
  </nav>

  <!-- Center -->
  <div class="center">

    <div class="logo-wrap">
      <img class="logo-img" src="https://i.postimg.cc/G2SQpxSy/IMG-20260413-215219-869.jpg" alt="Dostwin"/>
    </div>

    <h1 class="site-name">Dostwin Official</h1>
    <p class="tagline">Where Fortune Meets Destiny</p>

    <div class="divider"></div>

    <div class="loader-box">
      <div class="loader-label">
        <span>Loading</span>
        <span id="pctLabel">0%</span>
      </div>
      <div class="loader-track">
        <div class="loader-fill" id="fill"></div>
      </div>
    </div>

  </div>

  <script>
    // Sync percentage counter to CSS animation
    const label = document.getElementById('pctLabel');
    const keyframes = [
      {t:900,  target:0},
      {t:2180, target:48},
      {t:3150, target:74},
      {t:3770, target:91},
      {t:4100, target:100},
    ];
    let start = null;
    function lerp(a,b,t){return a+(b-a)*t;}
    function easeOut(t){return 1-Math.pow(1-t,3);}

    function tick(ts){
      if(!start) start = ts;
      const elapsed = ts - start;
      let pct = 0;
      for(let i=keyframes.length-1;i>=0;i--){
        if(elapsed >= keyframes[i].t){
          if(i<keyframes.length-1){
            const seg = keyframes[i+1].t - keyframes[i].t;
            const prog = Math.min((elapsed-keyframes[i].t)/seg,1);
            pct = lerp(keyframes[i].target, keyframes[i+1].target, easeOut(prog));
          } else {
            pct = keyframes[i].target;
          }
          break;
        }
      }
      label.textContent = Math.round(pct)+'%';
      if(elapsed < 4200) requestAnimationFrame(tick);
      else label.textContent = '100%';
    }
    requestAnimationFrame(tick);
  </script>

</body>
</html>
